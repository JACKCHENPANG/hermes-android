name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build APK
        run: |
          cd hermes-android-bridge
          # Download gradle wrapper manually
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar
          curl -L -o gradle/wrapper/gradle-wrapper.properties https://raw.githubusercontent.com/raulvidis/hermes-android/main/hermes-android-bridge/gradle/wrapper/gradle-wrapper.properties
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-android-apk
          path: hermes-android-bridge/app/build/outputs/apk/debug/app-debug.apk
